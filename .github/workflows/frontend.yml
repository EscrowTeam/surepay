name: Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # ID Reown AppKit — stocker dans Settings > Secrets > Actions
          NEXT_PUBLIC_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_PROJECT_ID || 'ci-build-placeholder' }}
          # Adresses neutres — le build ne nécessite pas de réseau actif
          NEXT_PUBLIC_ESCROW_VAULT_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_CHANTIER_NFT_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_TRUST_SCORE_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_TOKEN_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_USDC_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_NETWORK: "hardhat"
          NEXT_PUBLIC_DEPLOY_BLOCK: "1"
